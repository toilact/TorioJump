<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mario Arcade Feel Demo</title>
  </head>
  <body>
    <div id="app">
      <div id="login-screen" class="login-screen">
        <div class="login-content">
          <h1>TORIO: HELL MODE</h1>
          <p>The ultimate 2D precision challenge</p>
          <input type="text" id="player-name-input" placeholder="Enter your name..." maxlength="15" />
          <button id="start-game-btn">START CHALLENGE</button>
        </div>
      </div>

      <div class="game-viewport">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        
        <div class="game-title-box">
          <h1>TORIO</h1>
          <div class="mode-badge">HELL MODE ACTIVE</div>
        </div>

        <div class="hud-console">
          <div class="hud-panel">
            <div class="hud-header">
              <span>SYSTEM STATUS</span>
              <span id="fps-counter">LIVE</span>
            </div>
            <div id="grounded-badge" class="hud-stat">
              <span>GROUNDED</span>
              <div class="status-dot"></div>
            </div>
            <div id="coyote-badge" class="hud-stat">
              <span>COYOTE TIME</span>
              <div class="status-dot"></div>
            </div>
            <div id="buffer-badge" class="hud-stat">
              <span>JUMP BUFFER</span>
              <div class="status-dot"></div>
            </div>
            <div id="double-jump-badge" class="hud-stat">
              <span>DOUBLE JUMP</span>
              <div class="status-dot"></div>
            </div>
            <div id="apex-badge" class="hud-stat">
              <span>APEX PHYSICS</span>
              <div class="status-dot"></div>
            </div>
          </div>
        </div>

        <div id="message-overlay" class="message-overlay hidden">
          <span id="message-text"></span>
        </div>

        <div class="controls-guide">
          <span>[A/D] MOVE</span>
          <span>[SPACE] JUMP / 2X DOUBLE</span>
          <span>[R] RESTART</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
